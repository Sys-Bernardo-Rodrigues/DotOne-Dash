services:
  mongodb:
    image: mongo:7
    container_name: mydotgrowth-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: mydotgrowth
    volumes:
      - mydotgrowth_mongodb_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mydotgrowth-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"

volumes:
  mydotgrowth_mongodb_data:
